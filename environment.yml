name: flytracker
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  # core scientific stack
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - statsmodels
  - scikit-learn
  # data I/O
  - pytables
  - h5py
  - pyarrow
  - pyyaml
  # image / video
  - opencv
  - moviepy
  - ffmpeg
  # plotting extras
  - plotly
  # geometry
  - shapely
  # jupyter / interactive
  - ipython
  - ipykernel
  - jupyter
  # testing
  - pytest
  # utilities
  - tqdm
  - tabulate
  - python-sounddevice
  # pip-only packages
  - pip
  - pip:
    - mat73
    - -e .
